<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 转换器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://unpkg.com/docx@7.3.0/build/index.js"></script>
    
    <style>
        :root {
            --google-bg: rgb(240, 243, 248);
            --google-blue: #1a73e8;
            --google-blue-hover: #1557b0;
            --google-text: #3c4043;
            --glass-shadow: 0 10px 30px rgba(0,0,0,0.08), -1px 0 2px rgba(0,255,255,0.1), 1px 0 2px rgba(255,0,0,0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Product Sans', -apple-system, BlinkMacSystemFont, Arial, sans-serif;
            background-color: var(--google-bg);
            color: var(--google-text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            perspective: 1000px;
        }

        .dev-icon {
            position: absolute;
            top: 24px;
            left: 24px;
            width: 54px;
            height: 54px;
            border-radius: 50%;
            cursor: pointer;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.8);
            box-shadow: var(--glass-shadow);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
        }

        .dev-icon:hover {
            transform: scale(1.1) rotate(5deg);
        }

        .container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            padding: 45px;
            border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: var(--glass-shadow);
            width: 90%;
            max-width: 520px;
            text-align: center;
            animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transform-origin: center bottom;
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .options-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .options-container label {
            font-size: 15px;
            color: var(--google-text);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s ease;
        }
        
        .options-container label:hover {
            color: var(--google-blue);
        }

        #drop-zone {
            border: 2px dashed #dadce0;
            border-radius: 16px;
            padding: 65px 20px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            cursor: pointer;
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
            background: rgba(255,255,255,0.5);
        }

        #drop-zone.hover {
            border-color: var(--google-blue);
            transform: scale(1.02);
            background: rgba(26, 115, 232, 0.05);
        }

        #drop-zone p {
            position: relative;
            z-index: 1;
            font-size: 16px;
            font-weight: 500;
            color: #5f6368;
            pointer-events: none;
        }

        .btn {
            background-color: var(--google-blue);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: none;
            margin: 15px auto;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 4px 10px rgba(26, 115, 232, 0.3);
        }

        .btn:hover {
            background-color: var(--google-blue-hover);
            transform: translateY(-2px);
        }
        
        .btn:disabled {
            background-color: #a0c1efff;
            cursor: not-allowed;
            transform: none;
        }

        #loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s ease;
        }

        #loading-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .progress-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 50px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.6);
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 4px solid rgba(26, 115, 232, 0.2);
            border-top: 4px solid var(--google-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #status-text {
            font-size: 15px;
            color: #3c4043;
            margin: 0;
            font-weight: 500;
        }

        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(0px);
            -webkit-backdrop-filter: blur(0px);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .modal.show {
            opacity: 1;
            visibility: visible;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.95);
            width: 340px;
            padding: 35px;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.8);
            line-height: 1.7;
            font-size: 14px;
            transform: scale(0.8) translateY(30px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal.show .modal-content {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        .modal-content h3 { margin-top: 0; color: var(--google-blue); font-size: 20px; }
        
        .contact-list { 
            text-align: left; 
            background: rgba(248, 249, 250, 0.8); 
            padding: 12px 15px; 
            border-radius: 12px; 
            font-family: 'Courier New', Courier, monospace; 
            font-size: 13px;
        }
    </style>
</head>
<body>

    <img src="Developer.jpg" class="dev-icon" id="dev-trigger" alt="Developer" onerror="this.src='https://via.placeholder.com/54'">

    <div class="container">
        <h2 style="font-weight: 500; letter-spacing: -0.5px;">PDF 转换器 <span style="font-size: 14px; color: #1a73e8; vertical-align: middle; background: #e8f0fe; padding: 2px 8px; border-radius: 10px;">Web</span></h2>
        
        <div id="export-options" class="options-container">
            <label><input type="radio" name="exportType" value="pptx" checked> PPTX</label>
            <label><input type="radio" name="exportType" value="jpg"> JPG图片</label>
            <label><input type="radio" name="exportType" value="docx"> Word文档</label>
        </div>

        <div id="drop-zone">
            <p>点击或将 PDF 文件拖入此处</p>
            <input type="file" id="file-input" accept="application/pdf" multiple style="display:none">
        </div>

        <button id="download-btn" class="btn">保存转换结果</button>
    </div>

    <div id="loading-overlay">
        <div class="progress-box">
            <div class="spinner"></div>
            <p id="status-text">准备转换...</p>
            <p id="slow-notice" style="display:none; color: #d93025; font-weight: 500; font-size: 13px; margin-top: 12px;">
                你可能遇见了一些性能问题，请等待，这不会太久…
            </p>
        </div>
    </div>

    <div id="dev-modal" class="modal">
        <div class="modal-content">
            <h3>开发者：Lumis</h3>
            <p>这是靠一只狗对语音识别系统狂吠制造出来的用于转换 PDF 为其他文件的程序</p>
            <div class="contact-list">
                Lumis_photograph@outlook.com<br>
                leicaoptics3017@gmail.com<br>
                leicaoptics@qq.com<br>
                Lumis_photograph@163.com<br>
                +86 138 3079 1385
            </div>
            <p style="font-size: 12px; color: #70757a; margin-top: 20px; text-align: center;">这只狗使用了许多开源项目，他对此很感谢。</p>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const loadingOverlay = document.getElementById('loading-overlay');
        const statusText = document.getElementById('status-text');
        const slowNotice = document.getElementById('slow-notice');
        const downloadBtn = document.getElementById('download-btn');
        const modal = document.getElementById('dev-modal');
        const devTrigger = document.getElementById('dev-trigger');
        
        let globalZip = new JSZip();
        let processedCount = 0;
        let slowTimer = null;

        devTrigger.onclick = () => modal.classList.add('show');
        modal.onclick = () => modal.classList.remove('show');

        dropZone.onclick = () => fileInput.click();
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('hover'); };
        dropZone.ondragleave = () => dropZone.classList.remove('hover');
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('hover');
            handleFiles(e.dataTransfer.files);
        };
        fileInput.onchange = (e) => handleFiles(e.target.files);

        async function handleFiles(fileList) {
            const files = Array.from(fileList);
            if (!files || files.length === 0) return;
            
            const exportFormat = document.querySelector('input[name="exportType"]:checked').value;
            
            loadingOverlay.classList.add('active');
            downloadBtn.style.display = 'none';
            slowNotice.style.display = 'none';
            
            globalZip = new JSZip();
            processedCount = 0;
            
            slowTimer = setTimeout(() => { slowNotice.style.display = 'block'; }, 8000);

            for (let f = 0; f < files.length; f++) {
                let file = files[f];
                if (file.type !== 'application/pdf') continue;

                try {
                    statusText.innerText = `正在处理 (${f + 1}/${files.length}): ${file.name}...`;
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                    const baseName = file.name.replace(/\.[^/.]+$/, "");

                    if (exportFormat === 'pptx') {
                        const pptxBlob = await convertToPptx(pdf);
                        globalZip.file(`${baseName}.pptx`, pptxBlob);
                        processedCount++;
                    } else if (exportFormat === 'jpg') {
                        const imgFolder = files.length > 1 ? globalZip.folder(baseName) : globalZip;
                        await convertToJpg(pdf, imgFolder, baseName);
                        processedCount++;
                    } else if (exportFormat === 'docx') {
                        const docxBlob = await convertToDocx(pdf);
                        if (docxBlob) {
                            globalZip.file(`${baseName}.docx`, docxBlob);
                            processedCount++;
                        } else {
                            statusText.innerText = "未提取到有效文字";
                            await new Promise(r => setTimeout(r, 1500));
                        }
                    }
                } catch (err) {
                    console.error(err);
                }
            }

            clearTimeout(slowTimer);

            if (processedCount > 0) {
                loadingOverlay.classList.remove('active');
                downloadBtn.style.display = 'block';
                downloadBtn.innerText = '下载转换后文件';
                
                downloadBtn.onclick = async () => {
                    downloadBtn.innerText = "正在准备下载内容...";
                    downloadBtn.disabled = true;
                    try {
                        const zipFiles = Object.keys(globalZip.files);
                        if (zipFiles.length === 1 && exportFormat !== 'jpg') {
                            const singleFile = globalZip.files[zipFiles[0]];
                            const blob = await singleFile.async("blob");
                            saveAs(blob, zipFiles[0]);
                        } else {
                            const content = await globalZip.generateAsync({ type: "blob" });
                            saveAs(content, `PDF_Converted_Files_${Date.now()}.zip`);
                        }
                        downloadBtn.innerText = "下载 或继续转换";
                    } catch (e) {
                        downloadBtn.innerText = "失败 请重试";
                        console.error(e);
                    } finally {
                        downloadBtn.disabled = false;
                    }
                };
            } else {
                if (statusText.innerText !== "未提取到有效文字") {
                    statusText.innerText = "错误：未发现有效文件";
                }
                setTimeout(() => {
                    loadingOverlay.classList.remove('active');
                }, 2000);
            }

            fileInput.value = '';
        }

        async function convertToPptx(pdf) {
            const pptx = new PptxGenJS();
            const totalPages = pdf.numPages;
            
            for (let i = 1; i <= totalPages; i++) {
                statusText.innerText = `处理 PPTX: 第 ${i} / ${totalPages} 页...`;
                
                const page = await pdf.getPage(i);
                const viewport = page.getViewport({ scale: 2.0 }); 
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                
                await page.render({ canvasContext: context, viewport: viewport }).promise;
                
                const imgData = canvas.toDataURL('image/jpeg', 0.8);
                const slide = pptx.addSlide();
                slide.addImage({ data: imgData, x: 0, y: 0, w: '100%', h: '100%' });

                const textContent = await page.getTextContent();
                const textViewport = page.getViewport({ scale: 1.0 });
                
                textContent.items.forEach(item => {
                    if (item.str.trim() === '') return;
                    const tx = item.transform;
                    const x = (tx[4] / textViewport.width) * 100;
                    const y = (1 - (tx[5] / textViewport.height)) * 100;
                    const fontSize = Math.sqrt(tx[0] * tx[0] + tx[1] * tx[1]) * 0.7;

                    slide.addText(item.str, {
                        x: `${x}%`,
                        y: `${y}%`,
                        fontSize: fontSize,
                        color: '000000',
                        fill: { color: 'FFFFFF', transparency: 100 }
                    });
                });
                await new Promise(resolve => requestAnimationFrame(resolve));
            }
            return await pptx.write({ outputType: "blob" });
        }

        async function convertToJpg(pdf, targetZipFolder, baseName) {
            const totalPages = pdf.numPages;
            for (let i = 1; i <= totalPages; i++) {
                statusText.innerText = `提取图片: 第 ${i} / ${totalPages} 页...`;
                const page = await pdf.getPage(i);
                const viewport = page.getViewport({ scale: 2.0 });
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                
                await page.render({ canvasContext: context, viewport: viewport }).promise;
                const imgData = canvas.toDataURL('image/jpeg', 0.9).split(',')[1];
                
                targetZipFolder.file(`${baseName}_Page_${i}.jpg`, imgData, {base64: true});
                await new Promise(resolve => requestAnimationFrame(resolve));
            }
        }

        async function convertToDocx(pdf) {
            const paragraphs = [];
            const totalPages = pdf.numPages;
            let hasAnyText = false;

            for (let i = 1; i <= totalPages; i++) {
                statusText.innerText = `提取文字: 第 ${i} / ${totalPages} 页...`;
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                
                let pageText = textContent.items.map(item => item.str).join(" ");
                if(pageText.trim() !== "") {
                    hasAnyText = true;
                    paragraphs.push(new docx.Paragraph({
                        children: [new docx.TextRun(pageText)]
                    }));
                    paragraphs.push(new docx.Paragraph({ children: [new docx.TextRun("")] }));
                }
                await new Promise(resolve => requestAnimationFrame(resolve));
            }

            if(!hasAnyText) {
                return null;
            }

            const doc = new docx.Document({
                sections: [{ properties: {}, children: paragraphs }]
            });
            return await docx.Packer.toBlob(doc);
        }
    </script>
</body>
</html>
